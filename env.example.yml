# env.yml — operator credentials and deployment values.
#
# Copy this file to env.yml (git ignored — never commit it) and fill in real
# values. Then run:
#
#   node scripts/generate-env.js sovereign
#
# This renders apps/sovereign/.env from the latest upstream
# apps/sovereign/.env.example plus the values below, and encrypts it to
# apps/sovereign/.env.enc (which IS committed).
#
# Only the keys you set here are written into .env. Anything you omit keeps
# whatever default apps/sovereign/.env.example already has (or, for optional
# features like SMTP/VAPID/instance branding, stays disabled/unset). Keys
# under "Required" below MUST be set or generate-env.js refuses to render.

global:
  # Your age public key (age1...). Used as the encryption target for
  # apps/sovereign/.env.enc when apps.sovereign.AGE_PUBLIC_KEY (below) is not
  # set, and as the fallback for AGE_PUBLIC_KEY in the rendered .env itself
  # (used by scripts/backup-sovereign.sh to encrypt backups leaving the VPS).
  # Generate a keypair with: age-keygen -o ~/.age/key.txt
  agePublicKey: age1YOUR_AGE_PUBLIC_KEY_HERE

apps:
  sovereign:
    # ── Required — generate-env.js fails without these ─────────────────────
    # Generate secrets with: openssl rand -base64 32
    AUTH_SECRET: ''
    SOVEREIGN_ADMIN_KEY: ''
    POSTGRES_PASSWORD: ''

    # Public URLs — one entry per domain, repeated across the keys sovereign
    # and the WebAuthn/passkey flow need. AUTH_WEBAUTHN_RP_ID must be the bare
    # registrable domain (e.g. example.com) — changing it after passkeys are
    # registered invalidates all existing passkeys.
    NEXT_PUBLIC_RUNTIME_URL: 'https://YOUR_RUNTIME_DOMAIN'
    AUTH_BASE_URL: 'https://YOUR_AUTH_DOMAIN'
    SOVEREIGN_AUTH_PUBLIC_URL: 'https://YOUR_AUTH_DOMAIN'
    AUTH_COOKIE_DOMAIN: '.YOUR_ROOT_DOMAIN'
    AUTH_WEBAUTHN_RP_ID: 'YOUR_ROOT_DOMAIN'
    AUTH_WEBAUTHN_ORIGIN: 'https://YOUR_RUNTIME_DOMAIN,https://YOUR_AUTH_DOMAIN'

    # Backups (scripts/backup-sovereign.sh). Fine-grained PAT with Contents
    # read+write on your backup repo.
    BACKUP_GITHUB_TOKEN: ''
    BACKUP_GITHUB_REPO: 'your-org/sovereign-backups'
    # Falls back to global.agePublicKey above if omitted here.
    AGE_PUBLIC_KEY: 'age1YOUR_AGE_PUBLIC_KEY_HERE'

    # ── Optional — omit to keep apps/sovereign/.env.example's own default ──

    # Distinct from AUTH_SECRET only if you want to rotate them independently.
    # SOVEREIGN_AUTH_SECRET: ''

    # Required in practice for the bundled Plainwrite plugin's GitHub PAT
    # flow — see apps/sovereign/.env.example.
    # SOVEREIGN_VAULT_KEY: ''

    # true = registration requires a valid invite (first user is exempt).
    # AUTH_INVITE_ONLY: 'false'

    # error | warn (default) | info | debug
    # LOG_LEVEL: 'warn'

    # SMTP_HOST: ''
    # SMTP_PORT: '587'
    # SMTP_USER: ''
    # SMTP_PASS: ''
    # SMTP_FROM ships active (not commented) in apps/sovereign/.env.example
    # with a YOUR_ROOT_DOMAIN placeholder — generate-env.js's validation
    # rejects any leftover placeholder, so set this even if you're leaving
    # SMTP_HOST unset (SMTP itself stays disabled either way).
    # SMTP_FROM: 'Sovereign <noreply@YOUR_ROOT_DOMAIN>'

    # Generate with: npx web-push generate-vapid-keys
    # VAPID_PUBLIC_KEY: ''
    # VAPID_PRIVATE_KEY: ''
    # VAPID_CONTACT: 'mailto:admin@YOUR_ROOT_DOMAIN'

    # polling (default) | sse | redis — see apps/sovereign/.env.example.
    # NOTIFICATION_TRANSPORT: 'sse'
    # REDIS_URL: 'redis://localhost:6379'

    # INSTANCE_NAME: 'Sovereign'
    # INSTANCE_PRIMARY_COLOR: '#000000'
    # INSTANCE_LOGO: 'https://example.com/logo.png'
    # INSTANCE_LOGO_DARK: 'https://example.com/logo-dark.png'
    # INSTANCE_FAVICON: 'https://example.com/favicon.ico'
    # INSTANCE_EMAIL_FROM_NAME: 'Sovereign'
    # INSTANCE_EMAIL_LOGO: 'https://example.com/logo-email.png'

    # Currently deployed sovereign version — CI overwrites this on each
    # deploy, so it's rarely worth pinning here.
    # SOVEREIGN_VERSION: '0.9.10'

    # POSTGRES_USER: 'sovereign'
    # POSTGRES_DB: 'sovereign'
    # RUNTIME_PORT: '4000'
    # AUTH_PORT: '4001'
    # AUTH_WEBAUTHN_RP_NAME: 'Sovereign'

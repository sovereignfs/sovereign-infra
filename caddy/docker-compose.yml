services:
  caddy:
    image: caddy:2-alpine
    container_name: caddy
    # host network: Caddy reaches app ports on localhost without every app
    # needing to join a shared Docker network.
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./conf.d:/etc/caddy/conf.d:ro
      - caddy_data:/data      # Let's Encrypt certs — survives restarts
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
